name: matrix
on:
  workflow_dispatch:
jobs:
 build:
   strategy:
     matrix:
       environment: [ "beta", "alpha", "gama" ]
       version: [ 21,17 ]
   runs-on: ubuntu-latest
   steps:
     - name: clooning the repository
       uses: actions/checkout@v7.0.0
     - name: setup the java
       uses: actions/setup-java@v5.5.0
       with:
         java-version: ${{ matrix.version }}
         distribution: 'temurin'
     - name: environment 
       run: echo " ${{ matrix.environment }} "
     - name: compiling the java source code
       run: javac Test.java
     - name: executing the source code 
      run: java Test
