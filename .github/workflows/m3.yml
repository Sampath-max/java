name: m3-file
on:
  workflow_dispatch:
jobs:
  build:
    strategy:
      matrix:
        version: [ 21,17 ]
        environment: [ "beta","gamma","delta" ]
        os: [ "ubuntu-latest","windows-latest" ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: cloning the repository
        uses: actions/checkout@v4
      - name: setup-java
        uses: actions/setup-java@v5.5.0
        with:
          java-version: ${{ matrix.version }}
          distribution: 'temurin'
      - name: Environment
        run: echo " ${{ matrix.environment }}
      - name: compiling the source code
        run: javac Test.java
      - name: executing the source code
        run: java Test
      - name: java version
        run: java --version 
        
